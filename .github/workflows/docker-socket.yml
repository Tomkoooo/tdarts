name: Docker Socket

# Socket image uses only apps/socket; no monorepo root files in the build context.
on:
  push:
    branches: ["main", "new_ui"]
    paths:
      - "apps/socket/**"
      - ".github/workflows/docker-socket.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Distinct GHCR package from the web image (${{ github.repository }}) and tdarts-api
  IMAGE_NAME: ${{ github.repository_owner }}/tdarts-socket

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=socket-latest,enable={{is_default_branch}}
            type=sha,prefix=socket-,format=short
            type=semver,pattern=socket-{{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push socket image
        uses: docker/build-push-action@v6
        with:
          context: apps/socket
          file: apps/socket/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
